name: ns-program Dependency Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ns-program
        uses: actions/checkout@v4
        with:
          path: ns-program

      - name: Checkout Heller-Godel
        uses: actions/checkout@v4
        with:
          repository: SocioProphet/Heller-Godel
          ref: 988307215ad38ccb16514311222184a1b757752b
          path: Heller-Godel

      - name: Checkout Heller-Einstein
        uses: actions/checkout@v4
        with:
          repository: SocioProphet/Heller-Einstein
          ref: 8fa5a804bd5cf7e9e37be6477db52ff33e070350
          path: Heller-Einstein

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run structural tests
        run: |
          cd ns-program
          HELLER_GODEL_ROOT="$GITHUB_WORKSPACE/Heller-Godel" HELLER_EINSTEIN_ROOT="$GITHUB_WORKSPACE/Heller-Einstein" python -m unittest tests/test_pfk_dependency.py -v
